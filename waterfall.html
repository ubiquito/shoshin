<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One River</title>
<style>
  :root { --bg: #f8f6f1; --text: #1a1a1a; --text-light: #6b6860; --rule: #d4cfc5; --accent: #8b7355; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); min-height: 100vh; }
  body { font-family: 'Georgia', 'Times New Roman', serif; font-size: 17px; line-height: 1.8; max-width: 560px; margin: 0 auto; padding: 48px 24px 80px; text-align: center; }
  a.wordmark { font-family: system-ui, sans-serif; font-size: 13px; letter-spacing: 0.12em; color: var(--text-light); text-decoration: none; display: block; margin-bottom: 72px; text-align: left; }
  a.wordmark:hover { color: var(--accent); }
  hr { border: none; border-top: 1px solid var(--rule); margin: 48px 0; }
  .threshold { font-size: 22px; font-weight: normal; line-height: 1.5; font-style: italic; margin-bottom: 16px; }
  .fall { width: 1px; background: var(--rule); margin: 0 auto; height: 0; transition: height 120s linear; opacity: 0.4; }
  .fall.flowing { height: 400px; }
  .state { font-size: 22px; font-weight: normal; line-height: 1.6; font-style: italic; min-height: 80px; display: flex; align-items: center; justify-content: center; transition: opacity 3s; margin: 32px 0; }
  button { background: none; border: 1px solid var(--rule); color: var(--text-light); font-family: system-ui, sans-serif; font-size: 14px; padding: 10px 24px; cursor: pointer; letter-spacing: 0.04em; }
  button:hover { color: var(--accent); border-color: var(--accent); }
  .close { display: none; color: var(--text-light); font-style: italic; font-size: 16px; margin-top: 48px; }
</style>
</head>
<body>

<a href="index.html" class="wordmark">shoshin</a>

<p class="threshold">You were one river.</p>

<hr>

<div class="fall" id="fall"></div>
<div class="state" id="state"></div>

<button id="btn">Watch the water.</button>

<div class="close" id="close">
  <hr>
  <p>Each drop has a difficult experience falling.<br>Originally the water was one whole river.</p>
</div>

<script>
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx;

  // Water sound — filtered noise
  function waterSound(volume, duration) {
    if (!audioCtx) audioCtx = new AudioCtx();
    const now = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

    const source = audioCtx.createBufferSource();
    source.buffer = buffer;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    filter.Q.value = 1;

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(volume, now + 2);
    gain.gain.linearRampToValueAtTime(volume * 0.3, now + duration - 2);
    gain.gain.linearRampToValueAtTime(0, now + duration);

    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    source.start(now);
    source.stop(now + duration);
  }

  const state = document.getElementById('state');
  const phrases = [
    'The water separates.',
    'You are a drop now.',
    'The falling is difficult.',
    'You can feel the separation.',
    'The river is still here.',
    'You are still the water.',
    'The water returns.',
  ];

  let i = 0;

  document.getElementById('btn').addEventListener('click', function() {
    this.style.display = 'none';
    document.getElementById('fall').classList.add('flowing');
    waterSound(0.06, 120); // 2 minutes of quiet water
    cycle();
  });

  function cycle() {
    state.style.opacity = '0';
    setTimeout(() => {
      if (i >= phrases.length) {
        state.textContent = '';
        document.getElementById('close').style.display = 'block';
        return;
      }
      state.textContent = phrases[i];
      state.style.opacity = '1';
      i++;
      setTimeout(cycle, 15000);
    }, 3000);
  }
</script>
<div style="text-align:center;margin-top:64px;padding-top:24px;border-top:1px solid #d4cfc5;"><a href="module-09.html" style="font-family:system-ui,sans-serif;font-size:12px;letter-spacing:0.08em;color:#d4cfc5;text-decoration:none;">return to this week</a></div>
</body>
</html>
