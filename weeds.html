<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Weeds</title>
<style>
  :root { --bg: #f8f6f1; --text: #1a1a1a; --text-light: #6b6860; --rule: #d4cfc5; --accent: #8b7355; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); min-height: 100vh; }
  body { font-family: 'Georgia', 'Times New Roman', serif; font-size: 17px; line-height: 1.8; max-width: 560px; margin: 0 auto; padding: 48px 24px 80px; }
  a.wordmark { font-family: system-ui, sans-serif; font-size: 13px; letter-spacing: 0.12em; color: var(--text-light); text-decoration: none; display: block; margin-bottom: 72px; }
  a.wordmark:hover { color: var(--accent); }
  .threshold { font-size: 22px; font-weight: normal; line-height: 1.5; margin-bottom: 64px; font-style: italic; }
  hr { border: none; border-top: 1px solid var(--rule); margin: 48px 0; }
  .prompt { font-size: 17px; margin-bottom: 24px; }
  input { width: 100%; background: rgba(0,0,0,0.03); border: none; outline: none; font-family: inherit; font-size: 16px; line-height: 1.8; color: var(--text); padding: 16px; margin-bottom: 16px; }
  input::placeholder { color: var(--text-light); }
  .reframe { display: none; margin-top: 48px; }
  .reframe .pattern { font-size: 20px; color: var(--text); margin-bottom: 16px; }
  .reframe .arrow { font-size: 24px; color: var(--rule); margin: 24px 0; }
  .reframe .soil { font-size: 20px; color: var(--accent); font-style: italic; }
  .close { display: none; margin-top: 48px; color: var(--text-light); font-style: italic; font-size: 16px; }
</style>
</head>
<body>

<a href="index.html" class="wordmark">shoshin</a>
<p class="threshold">The difficulty is not an obstacle.<br>The difficulty is the soil.</p>
<hr>

<p class="prompt">What pattern keeps returning?</p>
<input id="pattern" type="text" placeholder="Name it." maxlength="120">

<div class="reframe" id="reframe">
  <hr>
  <p class="pattern" id="echo"></p>
  <p class="arrow">↓</p>
  <p class="soil">This is nourishment.<br>What is it growing?</p>
</div>

<div class="close" id="close">
  <hr>
  <p>The worst horse is the most valuable.<br>One continuous mistake can also be Zen.</p>
</div>

<script>
  const input = document.getElementById('pattern');
  let shown = false;
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && this.value.trim().length > 2 && !shown) {
      shown = true;
      this.readOnly = true;
      document.getElementById('echo').textContent = '"' + this.value.trim() + '"';
      document.getElementById('reframe').style.display = 'block';
      setTimeout(() => document.getElementById('close').style.display = 'block', 3000);
    }
  });
</script>
<div style="text-align:center;margin-top:64px;padding-top:24px;border-top:1px solid #d4cfc5;"><a href="module-04.html" style="font-family:system-ui,sans-serif;font-size:12px;letter-spacing:0.08em;color:#d4cfc5;text-decoration:none;">return to this week</a></div>
</body>
</html>
