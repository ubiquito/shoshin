<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wide Meadow</title>
<style>
  :root { --bg: #f8f6f1; --text: #1a1a1a; --text-light: #6b6860; --rule: #d4cfc5; --accent: #8b7355; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); min-height: 100vh; }
  body { font-family: 'Georgia', 'Times New Roman', serif; font-size: 17px; line-height: 1.8; max-width: 560px; margin: 0 auto; padding: 48px 24px 80px; text-align: center; }
  a.wordmark { font-family: system-ui, sans-serif; font-size: 13px; letter-spacing: 0.12em; color: var(--text-light); text-decoration: none; display: block; margin-bottom: 72px; text-align: left; }
  a.wordmark:hover { color: var(--accent); }
  .threshold { font-size: 22px; font-weight: normal; line-height: 1.5; margin-bottom: 64px; font-style: italic; }
  hr { border: none; border-top: 1px solid var(--rule); margin: 48px 0; }
  .space { min-height: 200px; display: flex; align-items: center; justify-content: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rule); opacity: 0.5; }
  .dot.breathing { animation: pulse 4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
  button { background: none; border: 1px solid var(--rule); color: var(--text-light); font-family: system-ui, sans-serif; font-size: 14px; padding: 10px 24px; cursor: pointer; letter-spacing: 0.04em; }
  button:hover { color: var(--accent); border-color: var(--accent); }
  .close { color: var(--text-light); font-style: italic; font-size: 16px; display: none; }
</style>
</head>
<body>

<a href="index.html" class="wordmark">shoshin</a>
<p class="threshold">You do not need to control this.<br>Watch. Just watch.</p>
<hr>

<div class="space">
  <div class="dot" id="dot"></div>
</div>

<button id="btn">Sit.</button>

<div class="close" id="close">
  <hr>
  <p>The best way to control<br>is to give a wide meadow.</p>
</div>

<script>
  document.getElementById('btn').addEventListener('click', function() {
    this.style.display = 'none';
    document.getElementById('dot').classList.add('breathing');
    // No visible timer. Just silence. After 3 minutes, the closing appears.
    setTimeout(() => {
      document.getElementById('dot').classList.remove('breathing');
      document.getElementById('dot').style.opacity = '0';
      document.getElementById('close').style.display = 'block';
    }, 180000);
  });
</script>
<div style="text-align:center;margin-top:64px;padding-top:24px;border-top:1px solid #d4cfc5;"><a href="module-06.html" style="font-family:system-ui,sans-serif;font-size:12px;letter-spacing:0.08em;color:#d4cfc5;text-decoration:none;">return to this week</a></div>
</body>
</html>
