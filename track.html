<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Single Track</title>
<style>
  :root { --bg: #f8f6f1; --text: #1a1a1a; --text-light: #6b6860; --rule: #d4cfc5; --accent: #8b7355; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); min-height: 100vh; }
  body { font-family: 'Georgia', 'Times New Roman', serif; font-size: 17px; line-height: 1.8; max-width: 560px; margin: 0 auto; padding: 48px 24px 80px; }
  a.wordmark { font-family: system-ui, sans-serif; font-size: 13px; letter-spacing: 0.12em; color: var(--text-light); text-decoration: none; display: block; margin-bottom: 72px; }
  a.wordmark:hover { color: var(--accent); }
  .threshold { font-size: 22px; font-weight: normal; line-height: 1.5; margin-bottom: 64px; font-style: italic; }
  hr { border: none; border-top: 1px solid var(--rule); margin: 48px 0; }
  .prompt { font-size: 17px; margin-bottom: 24px; }
  input { width: 100%; background: rgba(0,0,0,0.03); border: none; outline: none; font-family: inherit; font-size: 16px; line-height: 1.8; color: var(--text); padding: 16px; }
  input::placeholder { color: var(--text-light); }
  .previous { display: none; margin-bottom: 48px; }
  .previous-label { font-family: system-ui, sans-serif; font-size: 12px; letter-spacing: 0.08em; color: var(--text-light); margin-bottom: 8px; }
  .previous-entry { font-style: italic; color: var(--text-light); font-size: 16px; }
  .saved { display: none; margin-top: 32px; color: var(--text-light); font-style: italic; font-size: 15px; }
</style>
</head>
<body>

<a href="index.html" class="wordmark">shoshin</a>
<p class="threshold">The track does not change.<br>Only the scenery changes.</p>
<hr>

<div class="previous" id="prev">
  <p class="previous-label">Yesterday you wrote:</p>
  <p class="previous-entry" id="prev-text"></p>
  <hr>
</div>

<p class="prompt">What is your sincerity today?</p>
<input id="today" type="text" placeholder="One thing." maxlength="200">

<p class="saved" id="saved">Recorded. Return tomorrow.</p>

<hr>
<p style="color: var(--text-light); font-style: italic; font-size: 16px;">Sincerity is the track.<br>Thousands of miles, the same width.</p>

<script>
  const KEY = 'haiku-lab-zen-track';
  const data = JSON.parse(localStorage.getItem(KEY) || '{}');
  const today = new Date().toISOString().split('T')[0];

  // Show previous entry if it exists
  if (data.date && data.date !== today && data.entry) {
    document.getElementById('prev').style.display = 'block';
    document.getElementById('prev-text').textContent = '"' + data.entry + '"';
  }

  // If already written today, show it
  if (data.date === today && data.entry) {
    document.getElementById('today').value = data.entry;
    document.getElementById('today').readOnly = true;
    document.getElementById('saved').style.display = 'block';
  }

  document.getElementById('today').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && this.value.trim().length > 2) {
      localStorage.setItem(KEY, JSON.stringify({ date: today, entry: this.value.trim() }));
      this.readOnly = true;
      document.getElementById('saved').style.display = 'block';
    }
  });
</script>
<div style="text-align:center;margin-top:64px;padding-top:24px;border-top:1px solid #d4cfc5;"><a href="module-11.html" style="font-family:system-ui,sans-serif;font-size:12px;letter-spacing:0.08em;color:#d4cfc5;text-decoration:none;">return to this week</a></div>
</body>
</html>
