<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f8f6f1">
  <title>Enter — Shoshin</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f8f6f1;
      --text: #1a1a1a;
      --text-light: #6b6860;
      --accent: #8b7355;
      --rule: #d4cfc5;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 0 24px;
      opacity: 0;
      animation: arrive 1.2s ease-out 0.2s forwards;
    }

    @keyframes arrive {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .gate {
      width: 100%;
      max-width: 560px;
      height: 1px;
      background: var(--rule);
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
    }

    .portal {
      width: 100%;
      max-width: 560px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .kanji {
      font-size: 13px;
      letter-spacing: 0.25em;
      color: var(--text-light);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .prompt {
      font-size: 18px;
      color: var(--text-light);
      font-style: italic;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    .key-form {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .key-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--rule);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      letter-spacing: 0.06em;
      color: var(--text);
      padding: 12px 0;
      text-align: center;
      outline: none;
      transition: border-color 0.3s;
    }

    .key-input::placeholder {
      color: var(--rule);
      letter-spacing: 0.06em;
    }

    .key-input:focus {
      border-color: var(--accent);
    }

    .enter-btn {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--text);
      padding: 14px 36px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, opacity 0.2s;
    }

    .enter-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .enter-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .error {
      font-size: 14px;
      color: var(--accent);
      min-height: 20px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .error.visible {
      opacity: 1;
    }

    footer {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
    }

    footer p {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: var(--rule);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="gate"></div>

  <div class="portal">
    <p class="kanji">初心 — Shoshin</p>
    <p class="prompt">Enter your key to begin.</p>
    <form class="key-form" id="keyForm">
      <input
        type="text"
        class="key-input"
        id="keyInput"
        placeholder="license key"
        autocomplete="off"
        spellcheck="false"
        autofocus
      >
      <p class="error" id="error"></p>
      <button type="submit" class="enter-btn" id="enterBtn">Enter</button>
    </form>
  </div>

  <footer>
    <p>Haiku Lab</p>
  </footer>

  <script>
    const form = document.getElementById('keyForm');
    const input = document.getElementById('keyInput');
    const btn = document.getElementById('enterBtn');
    const error = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const key = input.value.trim();
      if (!key) return;

      error.classList.remove('visible');
      btn.disabled = true;

      try {
        const res = await fetch('/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key }),
        });

        const data = await res.json();

        if (data.valid) {
          window.location.href = data.redirect || '/';
        } else {
          error.textContent = data.error || 'Key not recognised';
          error.classList.add('visible');
          btn.disabled = false;
        }
      } catch {
        error.textContent = 'Something went wrong. Try again.';
        error.classList.add('visible');
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
